name: Trigger Vercel deploy

on:
  push:
    branches: [main]

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST to Vercel deploy hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK secret is missing"
            exit 1
          fi
          curl --fail --silent --show-error -X POST "$HOOK_URL"
